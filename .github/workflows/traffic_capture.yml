name: Grab Traffic Capture

on: [push, workflow_dispatch]

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TShark
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y tshark

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run TShark & Send Request
        run: |
          # Filter TShark untuk melihat Handshake TLS ke Grab
          # Kami menggunakan port 443 dan filter SNI
          sudo tshark -i any -f "tcp port 443" -Y "tls.handshake.extensions_server_name" \
            -T fields -e frame.time_relative -e ip.dst -e tls.handshake.extensions_server_name &
          
          TSHARK_PID=$!
          sleep 5 # Beri waktu TShark standby
          
          # Jalankan script pengirim traffic
          python src/app.py
          
          sleep 5
          sudo kill $TSHARK_PID || true

      - name: Full Packet Capture (Optional)
        # Menangkap paket mentah untuk dianalisis di PC lokal dengan Wireshark
        run: |
          sudo tcpdump -i any -w grab_traffic.pcap host mcd-gateway.grabtaxi.com &
          TCPDUMP_PID=$!
          python src/app.py
          sleep 2
          sudo kill $TCPDUMP_PID || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: grab-pcap-file
          path: grab_traffic.pcap
