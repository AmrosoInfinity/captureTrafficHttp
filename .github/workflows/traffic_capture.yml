name: Grab Traffic Analysis

on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analyze-traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Tools (TShark & Tcpdump)
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y tshark tcpdump

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

      - name: Network Capture & Execution
        run: |
          # 1. Start Capture (Targeting Grab Gateway)
          sudo tcpdump -i any -w raw_traffic.pcap host mcd-gateway.grabtaxi.com &
          SNIFF_PID=$!
          
          # 2. Run Python Script (Mimicking App Traffic)
          python src/app.py || echo "Script execution finished with warning/error"
          
          # 3. Buffer sleep and stop capture
          sleep 5
          sudo kill $SNIFF_PID || true
          
          # 4. Generate Raw Text Report (PCAP -> TXT)
          echo "=== GRAB NETWORK REPORT ===" > capture_report.txt
          echo "Run Date: $(date)" >> capture_report.txt
          echo "---------------------------" >> capture_report.txt
          
          if [ -s raw_traffic.pcap ]; then
            # Full verbose text to file
            sudo tshark -r raw_traffic.pcap -V -x >> capture_report.txt
            
            # Summary log to GitHub Actions Console (Using correct field: _ws.col.Info)
            echo -e "\n=== PACKET SUMMARY ===\n"
            sudo tshark -r raw_traffic.pcap -T fields -e frame.number -e _ws.col.Protocol -e ip.src -e ip.dst -e _ws.col.Info
          else
            echo "Error: No traffic captured. Check host filters." >> capture_report.txt
          fi

      - name: Auto-Commit Report
        run: |
          git config --global user.name "GigaByte-Bot"
          git config --global user.email "bot@gigabyte.internal"
          git add capture_report.txt
          git commit -m "docs: sync network report [skip ci]" || echo "Nothing to sync"
          git push
