name: HTTP Traffic Capture Workflow

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Memungkinkan menjalankan manual dari tab Actions

jobs:
  capture-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Start Traffic Capture (tcpdump)
        run: |
          # Menangkap traffic di port 80 (HTTP) dan menyimpan ke file .pcap
          # "&" menjalankan proses di background
          sudo tcpdump -i any -w network_traffic.pcap port 80 &
          # Simpan PID tcpdump agar bisa dimatikan nanti
          echo "TCPDUMP_PID=$!" >> $GITHUB_ENV
          echo "Tcpdump mulai merekam..."

      - name: Run Python Script
        run: |
          python src/app.py

      - name: Stop Traffic Capture
        run: |
          # Matikan proses tcpdump menggunakan PID yang disimpan tadi
          sudo kill $TCPDUMP_PID || true
          echo "Tcpdump dihentikan."

      - name: Upload Traffic Artifact
        uses: actions/upload-artifact@v4
        with:
          name: capture-result
          path: network_traffic.pcap
          retention-days: 5
