name: Grab Traffic Raw Text

on: 
  push:
  workflow_dispatch:

jobs:
  capture-to-text:
    runs-on: ubuntu-latest
    # Penting: Beri izin tulis agar bot bisa push file ke repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install TShark
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y tshark

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Capture and Convert
        run: |
          # 1. Mulai capture ke file sementara
          sudo tcpdump -i any -w temp.pcap host mcd-gateway.grabtaxi.com &
          DUMP_PID=$!
          
          # 2. Jalankan Script
          python src/app.py
          
          # 3. Beri waktu paket sampai, lalu matikan
          sleep 5
          sudo kill $DUMP_PID || true
          
          # 4. KONVERSI KE RAW TEXT (Format yang mudah dibaca di HP)
          # -V: Detail lengkap protokol
          # -x: Menampilkan Hex dan ASCII (biar kelihatan data mentahnya)
          echo "=== GRAB TRAFFIC REPORT ===" > capture_report.txt
          echo "Generated on: $(date)" >> capture_report.txt
          echo "---------------------------" >> capture_report.txt
          sudo tshark -r temp.pcap -V -x >> capture_report.txt

      - name: Commit Raw Text to Repo
        run: |
          git config --global user.name "GigaByte-Bot"
          git config --global user.email "bot@gigabyte.internal"
          git add capture_report.txt
          # skip ci agar tidak terjadi looping workflow
          git commit -m "docs: update raw traffic report [skip ci]" || echo "No changes to commit"
          git push
