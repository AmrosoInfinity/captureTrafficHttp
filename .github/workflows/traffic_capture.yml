name: Grab Traffic Automator

on:
  schedule:
    - cron: '*/15 * * * *'  # Berjalan setiap 15 menit
  workflow_dispatch:        # Tombol manual di tab Actions

jobs:
  execute-replayer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Requirements
        run: pip install requests

      - name: Run Script
        env:
          GRAB_TOKEN: ${{ secrets.GRAB_TOKEN }} # Ambil dari Secrets
        run: python scripts/replayer.py
