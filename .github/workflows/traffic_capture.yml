name: Grab Traffic Raw Text

on: 
  push:
  workflow_dispatch:

jobs:
  capture-to-text:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install TShark & Tcpdump
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y tshark tcpdump

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # --- PERBAIKAN DI SINI: Instalasi Requests ---
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Capture and App
        run: |
          # 1. Mulai capture di background
          sudo tcpdump -i any -w temp.pcap host mcd-gateway.grabtaxi.com &
          DUMP_PID=$!
          
          # 2. Jalankan Python (Gunakan '|| true' agar jika script 400/error, 
          # workflow tetap lanjut ke proses konversi teks)
          python src/app.py || echo "Script Python selesai dengan status non-zero (mungkin 400 Bad Request)"
          
          # 3. Beri jeda paket terakhir masuk
          sleep 5
          sudo kill $DUMP_PID || true
          
          # 4. Konversi ke teks detail untuk disimpan di repo
          echo "=== DETAIL TRAFFIC REPORT ===" > capture_report.txt
          echo "Generated on: $(date)" >> capture_report.txt
          
          # Cek apakah file pcap ada dan tidak kosong
          if [ -s temp.pcap ]; then
            sudo tshark -r temp.pcap -V -x >> capture_report.txt
            
            echo -e "\n=== RINGKASAN PACKET (LOG) ===\n"
            sudo tshark -r temp.pcap -T fields -e frame.number -e _ws.col.Protocol -e ip.src -e ip.dst -e info
          else
            echo "No traffic captured." >> capture_report.txt
          fi

      - name: Commit to Repo
        run: |
          git config --global user.name "GigaByte-Bot"
          git config --global user.email "bot@gigabyte.internal"
          git add capture_report.txt
          # [skip ci] penting agar tidak terjadi loop build terus menerus
          git commit -m "docs: update traffic report [skip ci]" || echo "No changes to commit"
          git push
