name: Grab Traffic Analysis

on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analyze-traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Network Tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y tshark tcpdump

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Sniff & Execute
        run: |
          # Mulai Sniffer (Filter Host Grab)
          sudo tcpdump -i any -w grab_raw.pcap host mcd-gateway.grabtaxi.com &
          SNIFFER_PID=$!
          
          # Jalankan Script Utama
          python src/app.py || echo "Script crash atau gagal"
          
          sleep 5
          sudo kill $SNIFFER_PID || true
          
          # Bangun Report Teks
          echo "=== GRAB TRAFFIC ANALYSIS REPORT ===" > capture_report.txt
          echo "Timestamp: $(date)" >> capture_report.txt
          
          if [ -s grab_raw.pcap ]; then
            # Full Verbose Dump ke File
            sudo tshark -r grab_raw.pcap -V -x >> capture_report.txt
            
            # Ringkasan di Console Actions (Gunakan _ws.col.Info)
            echo -e "\n--- LIVE PACKET SUMMARY ---\n"
            sudo tshark -r grab_raw.pcap -T fields -e frame.number -e _ws.col.Protocol -e ip.dst -e _ws.col.Info
          else
            echo "Failed to capture any packets." >> capture_report.txt
          fi

      - name: Push Report to Repo
        run: |
          git config --global user.name "GigaByte-Bot"
          git config --global user.email "bot@gigabyte.internal"
          git add capture_report.txt
          git commit -m "docs: update network log [skip ci]" || echo "No changes"
          git push
