name: Grab Traffic Raw Text

on: 
  push:
  workflow_dispatch:

jobs:
  capture-to-text:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install TShark
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y tshark

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Capture and App
        run: |
          # Mulai capture
          sudo tcpdump -i any -w temp.pcap host mcd-gateway.grabtaxi.com &
          DUMP_PID=$!
          
          # Jalankan Python
          python src/app.py
          
          sleep 5
          sudo kill $DUMP_PID || true
          
          # Konversi ke teks detail untuk disimpan di repo
          echo "=== DETAIL TRAFFIC REPORT ===" > capture_report.txt
          sudo tshark -r temp.pcap -V -x >> capture_report.txt
          
          # Buat ringkasan satu baris untuk dibaca cepat di console log
          echo -e "\n=== RINGKASAN PACKET (LOG) ===\n"
          sudo tshark -r temp.pcap -T fields -e frame.number -e _ws.col.Protocol -e ip.src -e ip.dst -e info

      - name: Commit to Repo
        run: |
          git config --global user.name "GigaByte-Bot"
          git config --global user.email "bot@gigabyte.internal"
          git add capture_report.txt
          git commit -m "docs: update traffic report [skip ci]" || echo "No changes"
          git push
